version: 2
updates:
  # npm dependencies — grouped, weekly. We don't want a PR per package.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      # Majors go through individually so we don't accidentally bundle a
      # breaking change into a routine update.

  # GitHub Actions — monthly is plenty; runner/version bumps don't move fast.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
      - automated
